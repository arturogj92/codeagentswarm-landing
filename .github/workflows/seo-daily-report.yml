name: SEO daily report

on:
  schedule:
    # 20:00 UTC = 22:00 Europe/Madrid in summer, 21:00 in winter.
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build and send the report
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          UMAMI_USERNAME: ${{ secrets.UMAMI_USERNAME }}
          UMAMI_PASSWORD: ${{ secrets.UMAMI_PASSWORD }}
        run: node scripts/seo-daily-report.mjs
